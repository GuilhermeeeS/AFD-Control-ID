<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de AFD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📅 Coletar AFD</h1>

    <div class="afd-section">
      <input type="date" id="data" required>
      <button onclick="coletarAFD()">Coletar AFD</button>
    </div>

    <div id="arquivos-gerados"></div>

    <hr style="margin: 2rem 0;">

    <h2>📍 IPs cadastrados</h2>

    <form id="form-ip">
      <input type="text" id="ip" placeholder="Digite o IP" required>
      <button type="submit">Adicionar IP</button>
    </form>

    <ul id="lista"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
